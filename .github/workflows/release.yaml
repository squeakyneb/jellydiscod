name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: jellydiscod
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: jellydiscod.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cp target/${{ matrix.target }}/release/jellydiscod jellydiscod-linux-x86_64

      - name: Rename artifact (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: copy target\${{ matrix.target }}\release\jellydiscod.exe jellydiscod-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellydiscod-${{ matrix.target }}
          path: |
            jellydiscod-linux-x86_64
            jellydiscod-windows-x86_64.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jellydiscod-linux-x86_64
            jellydiscod-windows-x86_64.exe
          generate_release_notes: true