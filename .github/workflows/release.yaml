name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: jellydiscod
            deb_arch: amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: jellydiscod
            deb_arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: jellydiscod.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.target, 'aarch64-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Linux)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.target, 'aarch64-unknown-linux-musl')
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            cp target/${{ matrix.target }}/release/jellydiscod jellydiscod-linux-x86_64
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cp target/${{ matrix.target }}/release/jellydiscod jellydiscod-linux-arm64
          fi

      - name: Create deb package (Linux)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.target, 'aarch64-unknown-linux-musl')
        run: |
          # Create debian package structure
          mkdir -p deb/opt/jellydiscod
          mkdir -p deb/etc/systemd/system
          mkdir -p deb/DEBIAN

          # Copy binary
          cp target/${{ matrix.target }}/release/jellydiscod deb/opt/jellydiscod/
          chmod 755 deb/opt/jellydiscod/jellydiscod

          # Copy service file
          cp jellydiscod.service deb/etc/systemd/system/
          chmod 644 deb/etc/systemd/system/jellydiscod.service

          # Extract version without 'v' prefix
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Create control file
          cat > deb/DEBIAN/control << EOF
          Package: jellydiscod
          Version: $VERSION
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: squeakyneb
          Description: Jellyfin Discovery Daemon
           A daemon for discovering Jellyfin servers
          EOF

          # Create postinst script to create user/group
          cat > deb/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e

          # Create jellydiscod user and group if they don't exist
          if ! getent group jellydiscod > /dev/null; then
            groupadd -r jellydiscod
          fi

          if ! getent passwd jellydiscod > /dev/null; then
            useradd -r -g jellydiscod -d /var/lib/jellydiscod -s /usr/sbin/nologin jellydiscod
          fi

          # Set permissions
          chown -R jellydiscod:jellydiscod /opt/jellydiscod

          # Reload systemd and enable the service
          systemctl daemon-reload || true
          EOF
          chmod 755 deb/DEBIAN/postinst

          # Build deb package
          dpkg-deb --build deb jellydiscod-${VERSION}-${{ matrix.deb_arch }}.deb
          rm -rf deb

      - name: Rename artifact (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: copy target\${{ matrix.target }}\release\jellydiscod.exe jellydiscod-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellydiscod-${{ matrix.target }}
          path: |
            jellydiscod-linux-*
            jellydiscod-*.deb
            jellydiscod-windows-x86_64.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jellydiscod-linux-*
            jellydiscod-*.deb
            jellydiscod-windows-x86_64.exe
          generate_release_notes: true