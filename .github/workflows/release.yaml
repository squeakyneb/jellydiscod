name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: jellydiscod
            deb_arch: amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: jellydiscod
            deb_arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: jellydiscod.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.target, 'aarch64-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Linux)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.target, 'aarch64-unknown-linux-musl')
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            cp target/${{ matrix.target }}/release/jellydiscod jellydiscod-linux-x86_64
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cp target/${{ matrix.target }}/release/jellydiscod jellydiscod-linux-arm64
          fi

      - name: Create deb package (Linux)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl') || startsWith(matrix.target, 'aarch64-unknown-linux-musl')
        run: |
          # Create debian package structure
          mkdir -p deb/opt/jellydiscod
          mkdir -p deb/etc/systemd/system
          mkdir -p deb/DEBIAN

          # Copy binary and service file
          cp target/${{ matrix.target }}/release/jellydiscod deb/opt/jellydiscod/
          chmod 755 deb/opt/jellydiscod/jellydiscod
          cp jellydiscod.service deb/etc/systemd/system/
          chmod 644 deb/etc/systemd/system/jellydiscod.service

          # Extract version without 'v' prefix
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Copy debian packaging files and substitute variables
          cp debian/control deb/DEBIAN/control
          sed -i "s/@VERSION@/$VERSION/g" deb/DEBIAN/control
          sed -i "s/@ARCHITECTURE@/${{ matrix.deb_arch }}/g" deb/DEBIAN/control

          cp debian/postinst deb/DEBIAN/postinst && chmod 755 deb/DEBIAN/postinst
          cp debian/prerm deb/DEBIAN/prerm && chmod 755 deb/DEBIAN/prerm
          cp debian/postrm deb/DEBIAN/postrm && chmod 755 deb/DEBIAN/postrm

          # Build deb package
          dpkg-deb --build deb jellydiscod-${VERSION}-${{ matrix.deb_arch }}.deb
          rm -rf deb

      - name: Rename artifact (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: copy target\${{ matrix.target }}\release\jellydiscod.exe jellydiscod-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellydiscod-${{ matrix.target }}
          path: |
            jellydiscod-linux-*
            jellydiscod-*.deb
            jellydiscod-windows-x86_64.exe
          if-no-files-found: ignore

  docker:
    name: Build and Push Docker Images
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        run: |
          cp jellydiscod-linux-x86_64 jellydiscod
          docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64 \
            -t ghcr.io/${{ github.repository }}:latest-amd64 \
            -f Dockerfile.buildx .
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
          docker push ghcr.io/${{ github.repository }}:latest-amd64

      - name: Build and push arm64 image
        run: |
          cp jellydiscod-linux-arm64 jellydiscod
          docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64 \
            -t ghcr.io/${{ github.repository }}:latest-arm64 \
            -f Dockerfile.buildx .
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          docker push ghcr.io/${{ github.repository }}:latest-arm64

      - name: Create and push manifests
        run: |
          docker manifest create ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          docker manifest annotate ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64 --os linux --arch amd64
          docker manifest annotate ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64 --os linux --arch arm64
          docker manifest push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

          docker manifest create --amend ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:latest-amd64 \
            ghcr.io/${{ github.repository }}:latest-arm64
          docker manifest annotate ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:latest-amd64 --os linux --arch amd64
          docker manifest annotate ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:latest-arm64 --os linux --arch arm64
          docker manifest push ghcr.io/${{ github.repository }}:latest

  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jellydiscod-linux-*
            jellydiscod-*.deb
            jellydiscod-windows-x86_64.exe
          generate_release_notes: true